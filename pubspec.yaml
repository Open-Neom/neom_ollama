name: neom_ollama
description: >-
  Ollama integration for Dart — model discovery, pull/delete, health checks,
  setup automation, OpenAI-compatible chat, hardware profiling, reasoning
  trace parsing, and plain-text tool-call recovery for local models that
  don't return structured tool_calls (Llama 3.2, Phi, Qwen, Hermes, DeepSeek).
version: 1.2.1
homepage: https://github.com/Open-Neom/neom_ollama
repository: https://github.com/Open-Neom/neom_ollama
issue_tracker: https://github.com/Open-Neom/neom_ollama/issues
topics:
  - ai
  - ollama
  - local-inference
  - llm

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  http: ^1.4.0

dev_dependencies:
  test: ^1.25.0
